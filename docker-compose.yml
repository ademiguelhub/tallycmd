services:
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: tallycmd-sql
    restart: unless-stopped
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
      MSSQL_PID: "Developer"
    volumes:
      - sql-data:/var/opt/mssql
      - ./backups:/var/opt/mssql/backup

volumes:
  sql-data:
